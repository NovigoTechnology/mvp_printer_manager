services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: printer_fleet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/printer_fleet
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_EXPIRY_MINUTES: ${JWT_EXPIRY_MINUTES:-120}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://10.10.10.193:3000}
      POLL_COMMUNITY: ${POLL_COMMUNITY:-public}
      DRYPIX_LOGIN: ${DRYPIX_LOGIN:-dryprinter}
      DRYPIX_PASSWORD: ${DRYPIX_PASSWORD:-fujifilm}
      SNMP_CONFIG_PATH: ${SNMP_CONFIG_PATH:-/app/config/snmp_credentials.json}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - api
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/.next

volumes:
  postgres_data:
  web_node_modules:
  web_next: